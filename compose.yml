services:

  db:
    image: postgres:16-alpine   # ~80 MB; native ARM64 + AMD64 image
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dayforge
      POSTGRES_USER:     dayforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dayforge -d dayforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file: .env
    environment:
      # Overrides any DATABASE_URL in .env with the in-compose db service
      DATABASE_URL: postgresql://dayforge:${DB_PASSWORD}@db:5432/dayforge
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
